<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeSet Office Setup</title>
  <script>
    (function(){
      var key = "weset_clear_local_once_v1";
      if (!localStorage.getItem(key)) {
        ["weset_clients","weset_quotes","weset_installations","weset_expenses","weset_users","weset_dashboard","weset_selected_client","weset_current_quote","weset_demo_seeded"].forEach(function(name){
          try { localStorage.removeItem(name); } catch (error) {}
        });
        localStorage.setItem(key, "done");
      }
    })();
  </script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css?v=20260621-stage10" />
</head>
<body>
  <div id="app"></div>
  <script src="clear-local-data-fix.js?v=20260621-stage10"></script>
  <script src="app.js?v=20260621-stage10"></script>
  <script>
    const version = "20260621-stage10";
    const scripts = [
      "email-preview-fix.js",
      "quote-send-fix.js",
      "edge-email-design-fix.js",
      "pdf-layout-fix.js",
      "invoice-pdf-layout-fix.js",
      "pdf-preview-layout-fix.js",
      "email-preview-layout-fix.js",
      "settings-table-fix.js",
      "settings-ui-fix.js",
      "quote-template-override-fix.js",
      "quote-line-dropdown-fix.js",
      "app-layout-cleanup-fix.js",
      "items-page-cleanup-fix.js",
      "accounting-expense-vat-fix.js",
      "expense-vat-ui-fix.js",
      "accounting-live-fix.js",
      "payments-accounting-fix.js",
      "invoice-workflow-fix.js",
      "invoice-recording-fix.js",
      "invoice-payment-workflow-fix.js",
      "quote-dashboard-client-history-fix.js",
      "accounting-workspace-cleanup.js",
      "smooth-accounting-refresh-fix.js",
      "payment-option-restore-fix.js",
      "expand-window-fix.js",
      "silent-refresh-fix.js",
      "auth-session-keepalive-fix.js",
      "quote-chain-workflow-fix.js",
      "accounting-page-stability-fix.js",
      "quote-workflow-rules-fix.js",
      "expand-button-inline-fix.js",
      "quote-reference-clean-fix.js",
      "invoice-chain-sync-fix.js",
      "app-final-cleanup-fix.js",
      "button-polish-fix.js",
      "button-polish-final-fix.js",
      "button-table-card-fix.js"
    ];
    scripts.forEach((src) => {
      const script = document.createElement("script");
      script.src = `${src}?v=${version}`;
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
